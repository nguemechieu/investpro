# InvestPro settings
# The app uses a local embedded database by default.
DB_MODE=LOCAL
DB_LOCAL_USER=sa
DB_LOCAL_PASSWORD=

# Optional custom JDBC configuration. Switch DB_MODE to CUSTOM to use it.
DB_URL=
DB_USER=root
DB_PASSWORD=
DB_DIALECT=
DB_DRIVER=
DB_HOST=localhost
DB_PORT=3306
DB_NAME=investpro

LOGIN_USERNAME=
LOGIN_PASSWORD=

# ── Broker Activity Event Store ───────────────────────────────────────────────
broker.activity.enabled=true
broker.activity.persistence.enabled=true
broker.activity.persistence.mode=sqlite
broker.activity.sqlite.path=data/investpro-activity.db
broker.activity.startupSync.enabled=true
broker.activity.realtime.enabled=true
broker.activity.lookbackDays=7
broker.activity.pollIntervalSeconds=30
broker.activity.cursor.required=false
broker.activity.rawJson.enabled=true
broker.activity.reconciliation.enabled=true
broker.activity.reconciliation.intervalSeconds=120
broker.activity.projection.failOnError=false
broker.activity.pendingConfirmation.timeoutSeconds=30

# ── Exchange-specific activity sync ──────────────────────────────────────────
oanda.activity.sync.enabled=true
oanda.activity.endpoint.transactions=/v3/accounts/{accountID}/transactions
oanda.activity.endpoint.sinceId=/v3/accounts/{accountID}/transactions/sinceid

coinbase.activity.sync.enabled=true
binanceus.activity.sync.enabled=true

# ── Live Readiness ────────────────────────────────────────────────────────────
liveReadiness.enabled=true
liveReadiness.blockOnCriticalFailure=true

# ── Rate Limiting ─────────────────────────────────────────────────────────────
rateLimit.enabled=true
rateLimit.backoff.jitter=true
rateLimit.default.maxRequestsPerSecond=2
rateLimit.oanda.maxRequestsPerSecond=2
rateLimit.oanda.pricing.cooldownMs=500
rateLimit.oanda.transactions.cooldownMs=1000
rateLimit.coinbase.maxRequestsPerSecond=3
rateLimit.binanceus.maxRequestsPerSecond=3

# ── Strategy Assignment ───────────────────────────────────────────────────────
strategy.assignment.persist=true
strategy.assignment.autoReevaluate.enabled=true
strategy.assignment.minNewTradesBeforeReevaluation=30
strategy.assignment.minHoursBetweenReevaluation=24

investpro.strategy.minStrategyScore=60.0
investpro.strategy.hardMinStrategyScore=40.0
investpro.strategy.reassignBelowScore=40.0
investpro.strategy.autoAssignBest=true
investpro.strategy.requireBacktestBeforeLive=true
investpro.strategy.requirePaperTradingBeforeLive=false
investpro.strategy.allowCompatibilityFallback=false

# ── Execution ─────────────────────────────────────────────────────────────────
investpro.execution.defaultSignalTradeUnits=1.0
investpro.execution.defaultStopDistancePercent=0.002
investpro.execution.defaultTakeProfitDistancePercent=0.004
investpro.execution.maxRiskPerTradePercent=2.0
investpro.execution.maxCumulativeRiskPercent=5.0
investpro.execution.estimatedSlippagePercent=0.02

# ── UI Truth Badges & Data Freshness ──────────────────────────────────────────
ui.truthBadges.enabled=true
ui.dataFreshness.warnAfterSeconds=30
ui.dataFreshness.staleAfterSeconds=120

# ── AI / OpenAI Reasoning ─────────────────────────────────────────────────────
ai.openai.enabled=true
ai.openai.apiKey=
ai.openai.endpoint=https://api.openai.com/v1/responses
ai.openai.model=gpt-4o
ai.openai.timeoutSeconds=30
ai.openai.temperature=0.1
ai.openai.maxOutputTokens=2000
ai.openai.store=false
ai.openai.strictJson=true
ai.openai.retry.enabled=true
ai.openai.retry.maxAttempts=3
ai.openai.retry.initialBackoffMs=300
ai.openai.logPayloads=false

# ── Email Notifications ───────────────────────────────────────────────────────
EMAIL_NOTIFICATIONS_ENABLED=false
EMAIL_SMTP_HOST=
EMAIL_SMTP_PORT=587
EMAIL_SMTP_USERNAME=
EMAIL_SMTP_PASSWORD=
EMAIL_SMTP_STARTTLS=true
EMAIL_FROM=
EMAIL_TO=
