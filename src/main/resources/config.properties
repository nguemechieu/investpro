# Stellar-specific auto-trading universe gates
investpro.stellar.allowUnknownIssuers=false
investpro.stellar.requireVerifiedDomain=true
investpro.stellar.allowAutoTrustline=false
investpro.stellar.minLiquidityScore=70
investpro.stellar.maxSpreadPercent=0.50
investpro.stellar.allowReversedPairs=true


