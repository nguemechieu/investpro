# ── Strategy Lab Backtesting Engine ───────────────────────────────────────────
# Max concurrent backtests (default: max(1, cpuCores/2))
strategy.lab.maxConcurrentBacktests=4
# Max jobs allowed in the queue before new submissions are rejected
strategy.lab.maxQueueSize=1000
# Live strategy assignment: bounded search so bot startup does not fan out across
# tens of thousands of variants and every timeframe.
strategy.lab.assignment.maxStrategies=24
strategy.lab.assignment.maxTimeframes=2
strategy.lab.assignment.timeoutSeconds=45
strategy.lab.assignment.maxTradesPerBacktest=150
# UI throttle: minimum ms between JavaFX refreshes (prevents update storms)
strategy.lab.uiUpdateThrottleMs=300
# Log each backtest at INFO level (false = aggregate stats log only)
strategy.lab.logEachBacktest=false
# Enable shared indicator cache (drastically reduces CPU for same-symbol runs)
strategy.lab.enableIndicatorCache=true
# Enable memory/CPU resource protection guards
strategy.lab.enableResourceProtection=true
# Memory threshold (%) above which new jobs are paused
strategy.lab.memoryThresholdPercent=85
# CPU threshold (0.0–1.0) above which scheduling slows down
strategy.lab.cpuThreshold=0.85

# ── Solana Blockchain Network ─────────────────────────────────────────────────
# Set to true to activate the Solana integration
solana.enabled=false
# Network: mainnet | devnet | testnet
solana.network=mainnet
# RPC endpoint (leave blank to use the default for the chosen network)
solana.rpcUrl=https://api.mainnet-beta.solana.com
# Commitment level: confirmed | finalized | processed
solana.commitment=confirmed
# DANGER: enable live on-chain transaction submission (false by default)
solana.tradingEnabled=false
# Wallet address for balance/tx display (no private key stored here)
solana.walletAddress=
# HTTP request timeout in seconds for RPC calls
solana.requestTimeoutSeconds=30
# Max automatic retries on transient RPC failures
solana.maxRetries=3
