services:
  postgres:
    image: postgres:16-alpine
    container_name: investpro-postgres
    environment:
      POSTGRES_DB: investpro
      POSTGRES_USER: investpro
      POSTGRES_PASSWORD: investpro123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investpro -d investpro"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - investpro-network
    restart: unless-stopped

  investpro-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: investpro-app

    # Load API keys and secrets from .env (gitignored, never committed)
    env_file:
      - path: .env
        required: false

    environment:
      APP_NAME: InvestPro
      APP_ENV: docker
      APP_DEBUG: "false"
      APP_TIMEZONE: America/New_York

      # Database — overrides .env values so the Docker service name is used as host
      DB_DIALECT: postgresql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: investpro
      DB_USERNAME: investpro
      DB_PASSWORD: investpro123

      DISPLAY: ":0"
      GEOMETRY: "1530x840"
      DEPTH: "24"
      VNC_PASSWORD: investpro

      JAVA_OPTS: "-Xmx2g -Xms512m -Djava.awt.headless=false -Dprism.order=sw -Dprism.verbose=false"

      DEFAULT_EXCHANGE: OANDA
      DEFAULT_MARKET_TYPE: FOREX
      DEFAULT_ACCOUNT_MODE: PAPER
      DEFAULT_TRADE_PAIR: EUR/USD

      AUTO_TRADING_ENABLED: "false"
      AI_REASONING_ENABLED: "true"
      MAX_RISK_PER_TRADE: "0.01"
      MAX_DAILY_LOSS: "0.03"

    ports:
      - "8080:8080"
      - "5900:5900"
      - "6080:6080"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./output:/app/output

    networks:
      - investpro-network

    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  investpro-network:
    driver: bridge
